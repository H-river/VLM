experiment:
  name: profile2setup_v2_placeholder
  seed: 42

data:
  train_path: profile2setup/data/train.jsonl
  val_path: profile2setup/data/val.jsonl
  image_key: profile
  prompt_key: prompt
  target_key: delta
  optional_target_profile_key: target_profile
  optional_current_setup_key: current_setup
  allow_missing_current_setup: true
  allow_missing_target_profile: true
  allow_missing_current_profile: true

model:
  type: placeholder
  input_channels: 1
  hidden_dim: 256
  output_dim: 7

optimization:
  batch_size: 16
  epochs: 20
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4

loss:
  absolute_weight: 1.0
  delta_weight: 1.0
  change_weight: 0.5
  normalize_by_mask: true

inference:
  prefer_absolute_when_setup_missing: true

logging:
  log_every_n_steps: 50
  save_dir: outputs/profile2setup_v2
