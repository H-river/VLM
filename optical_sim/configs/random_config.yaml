# Random sampling configuration for dataset generation.
# Each parameter specifies a uniform distribution [min, max].

base_config: "configs/base_config.yaml"

output_dir: "outputs/random"

num_samples: 5000

random_seed: 42

parameter_ranges:
  source.wavelength:        [400.0e-9, 800.0e-9]
  source.beam_waist:        [0.5e-3, 3.0e-3]
  lens.focal_length:        [0.03, 0.3]
  lens.clear_aperture:      [0.01, 0.05]
  geometry.laser_to_lens:   [0.05, 0.5]
  geometry.lens_to_camera:  [0.03, 0.5]
  alignment.x_offset:       [-3.0e-3, 3.0e-3]
  alignment.y_offset:       [-3.0e-3, 3.0e-3]
  alignment.tilt_x:         [-0.02, 0.02]
  alignment.tilt_y:         [-0.02, 0.02]
  alignment.defocus:        [-0.03, 0.03]
