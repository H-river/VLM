    extreme_far_up:      "shifted to the extreme far top"

  tilt:
    extreme_neg_tilt:     "extreme negative"
    very_strong_neg_tilt: "very strong negative"
    strong_neg_tilt:      "strong negative"
    firm_neg_tilt:        "firm negative"
